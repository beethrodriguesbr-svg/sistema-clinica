<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<link rel="stylesheet" href="style.css">

<!-- Ícones -->
<link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
</head>

<body>

<div class="layout">

    <!-- SIDEBAR -->
    <div class="sidebar">

        <img src="logo.png" class="logo-sidebar">

        <div class="menu">

            <button onclick="location.href='dashboard.html'">
                <i class="ri-dashboard-line"></i> Dashboard
            </button>

            <button onclick="location.href='cadastro.html'">
                <i class="ri-user-add-line"></i> Cadastro
            </button>

            <button onclick="location.href='clientes.html'">
                <i class="ri-team-line"></i> Clientes
            </button>

            <button onclick="location.href='financeiro.html'">
                <i class="ri-money-dollar-circle-line"></i> Financeiro
            </button>

            <button onclick="location.href='perfil.html'">
                <i class="ri-user-line"></i> Perfil
            </button>

            <button onclick="logout()">
                <i class="ri-logout-box-line"></i> Sair
            </button>

        </div>

    </div>

    <!-- MAIN -->
    <div class="main">

        <!-- TOPO -->
        <div class="topbar">
            <span>MEDPRIME System</span>
            <div class="user">
                👤 Usuário
            </div>
        </div>

        <!-- CONTEÚDO -->
        <div class="content">

            <h2>Dashboard</h2>

            <div class="cards">

                <div class="card destaque">
                    <h3 id="totalClientes">0</h3>
                    <p>Clientes</p>
                </div>

                <div class="card">
                    <h3 id="totalPago">0</h3>
                    <p>Pagos</p>
                </div>

                <div class="card">
                    <h3 id="totalPendente">0</h3>
                    <p>Pendentes</p>
                </div>

            </div>

            <!-- TABELA BONITA -->
            <div class="tabela-box">
                <h3>Últimos Clientes</h3>
                <table>
                    <thead>
                        <tr>
                            <th>Nome</th>
                            <th>Plano</th>
                        </tr>
                    </thead>
                    <tbody id="ultimosClientes"></tbody>
                </table>
            </div>

        </div>

    </div>

</div>

<script type="module" src="dashboard.js"></script>
<script type="module" src="auth.js"></script>

</body>
</html>
