<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Cadastro - MEDPRIME System</title>

<link rel="stylesheet" href="style.css">

<link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
</head>

<body>

<div class="layout">

    <!-- SIDEBAR -->
    <div class="sidebar">

        <img src="logo.png" class="logo-sidebar">

        <div class="menu">

            <button onclick="location.href='dashboard.html'">
                <i class="ri-dashboard-line"></i> Dashboard
            </button>

            <button class="ativo">
                <i class="ri-user-add-line"></i> Cadastro
            </button>

            <button onclick="location.href='clientes.html'">
                <i class="ri-team-line"></i> Clientes
            </button>

            <button onclick="location.href='financeiro.html'">
                <i class="ri-money-dollar-circle-line"></i> Financeiro
            </button>

            <button onclick="location.href='relatorios.html'">
                <i class="ri-bar-chart-line"></i> Relatórios
            </button>

            <button onclick="location.href='perfil.html'">
                <i class="ri-user-line"></i> Perfil
            </button>

            <button onclick="logout()">
                <i class="ri-logout-box-line"></i> Sair
            </button>

        </div>

    </div>

    <!-- MAIN -->
    <div class="main">

        <!-- TOPO -->
        <div class="topbar">
            <span>Cadastro de Clientes</span>

            <div class="user">
                👤 Novo Cadastro
            </div>
        </div>

        <!-- CONTEÚDO -->
        <div class="content">

            <!-- CARD -->
            <div class="form-card">

                <div class="form-header">
                    <h2>Novo Cliente</h2>
                    <p>Preencha os dados abaixo</p>
                </div>

                <div class="form-grid">

                    <div class="form-group">
                        <label>Nome do Cliente</label>
                        <input type="text" id="nome" placeholder="Digite o nome completo">
                    </div>

                    <div class="form-group">
                        <label>Data de Nascimento</label>
                        <input type="date" id="dataNascimento">
                    </div>

                    <div class="form-group full">
                        <label>Endereço</label>
                        <input type="text" id="endereco" placeholder="Digite o endereço">
                    </div>

                    <div class="form-group">
                        <label>Plano</label>

                        <select id="plano">
                            <option value="14">R$ 14,00</option>
                            <option value="28">R$ 28,00</option>
                        </select>
                    </div>

                </div>

                <!-- BOTÕES -->
                <div class="form-actions">

                    <button class="btn-voltar"
                    onclick="location.href='dashboard.html'">

                        <i class="ri-arrow-left-line"></i>
                        Voltar

                    </button>

                    <button class="btn-salvar"
                    onclick="salvar()">

                        <i class="ri-save-line"></i>
                        Salvar Cliente

                    </button>

                </div>

            </div>

        </div>

    </div>

</div>

<script type="module">

import { cadastrarCliente } from "./cliente.js";

window.salvar = async ()=>{

await cadastrarCliente();

alert("Cliente cadastrado com sucesso!");

location.href = "clientes.html";

}

</script>

<script type="module" src="auth.js"></script>

</body>
</html>
